<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio de Sesión</title>
    <link rel="stylesheet" href="InicioSesion.css">
</head>
<body>
    <main>
        <div class="ContenedorLogo">
            <img class="LogoGameSite" src="Assets/IconoMarca.png">
        </div>

        <div class="ContenedorLogBox">
            <div class="LogBox">
                <div class="ContenedorTitulo">
                    <h2 class="TituloInicioSesion">Inicio sesión</h2>
                </div>
                
                <form class="LogForm">
                    <div class="ContenedorInputUser">
                        <span class="Spans">Nombre de usuario</span>
                        <input class="Inputs" type="text">
                    </div>

                    <div class="ContenedorInputPass">
                        <span class="Spans">Contraseña</span>
                        <input class="Inputs" type="text">
                    </div>
                    
                    <div class="ContenedorRegistrate">
                        <span class="SpanRegistro">¿No tienes cuenta?</span>
                        <a class="LinkRegistro" href="index.html">Registrate</a>
                    </div>
                </form>
            </div>

        </div>
    </main>
</body>
</html>
