<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio de Sesión</title>
    <link rel="stylesheet" href="Registro.css">
</head>
<body>
    <header>
        <div class="ContenedorAtajos">
                <a href="index.html">
                    <img class="BtnInicio" src="Assets/IconoMarca.png">
                </a>
            </div>
    </header>
    <main>
        <div class="ContenedorGeneral">
            <div class="ContenedorTxtPresentacion">
                <span class="TxtPresentacion">¡Hola!<br>¡Que gusto verte!</span>
            </div>

            <div class="ContenedorLogBox">
                <div class="LogBox">
                    <div class="ContenedorTitulo">
                        <h2 class="TituloInicioSesion">Crea tu cuenta</h2>
                    </div>
                    
                    <form class="LogForm">
                        <div class="ContenedorInputUser">
                            <input class="Inputs" type="text" placeholder="Nombre de usuario">
                        </div>

                        <div class="ContenedorInputUser">
                            <input class="Inputs" type="text" placeholder="Nombre">
                        </div>

                        <div class="ContenedorInputUser">
                            <input class="Inputs" type="text" placeholder="Apellido">
                        </div>

                        <div class="ContenedorInputUser">
                            <input class="Inputs" type="text" placeholder="Mail">
                        </div>

                        <div class="ContenedorInputUser">
                            <input class="Inputs" type="password" placeholder="Contraseña">
                        </div>

                        <div class="ContenedorBoton">
                            <butto class="BtnIniciar">Registrarse</butto>
                        </div>
                        
                        <div class="ContenedorRegistrate">
                            <span class="SpanRegistro">¿Ya tienes cuenta?</span>
                            <a class="LinkRegistro" href="InicioSesion.html">Inicia aquí</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
