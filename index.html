<!DOCTYPE html>
<html lang="es">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>E-Commerce Videojuegos</title>
	<meta name="description" content="Tienda de videojuegos - estructura básica HTML">
	<link rel="stylesheet" href="estilosMain.css">
</head>
<body>
	<header>
		<nav class="Navbar">
			<ul class="ListaNav">
				<div class="ContenedorMarca">
					<img class="IconoMarca" src="Assets/IconoMarca.png">
					<span class="TituloMarca">Game Site</span>
				</div>

				<div class="ContenedorBuscar">
					<input class="InputBuscar" placeholder="Buscar título">
					<button>
						<img class="IconoBuscar" src="Assets/IconoBuscar.png">
					</button>
				</div>

				<div class="ContenedorCuenta">
					<button class="BtnCuenta">
						<img class="IconoUser" src="Assets/IconoUser.png">
					</button>
				</div>
			</ul>
		</nav>
	</header>

	<main>
		<div class="ContenedorJuegoNuevo">
			<div class="ContenedorTitulos">
				<div class="ContenedorTitulosArriba">
					<h2 class="TituloNuevoLanzamiento">Nuevo Lanzamiento</h2>
					<span class="SpanTituloPlataformas">
						<img class="IconoSpan" src="Assets/IconoPC.png"><img class="IconoSpan" src="Assets/IconoPlay.png"><img class="IconoSpan" src="Assets/IconoXbox.png">
					</span>
				</div>
				
				<h3 class="TituloJuego">007 First Light</h3>
				<span class="TituloPrecio">$39,99</span>
			</div>

			<div class="ContenedorBotones">
				<button class="BtnAgregar"><img class="IconoCarrito" src="Assets/IconoCarrito.png">Agregar al carrito</button>
				<button class="BtnLista"><img class="IconoCorazon" src="Assets/IconoCorazon.png">Lista de deseados</button>
			</div>
        </div>

		<div class="ContenedorPlataformas">
			<div class="Plataformas">
				<button class="BtnPlataforma">
					<img class="Icono" src="Assets/IconoPC.png">
				</button>
				
				<button class="BtnPlataforma">
					<img class="Icono" src="Assets/IconoPlay.png">
				</button>

				<button class="BtnPlataforma">
					<img class="Icono" src="Assets/IconoXbox.png">
				</button>

				<button class="BtnPlataforma">
					<img class="Icono" src="Assets/IconoNintendo.png">
				</button>
			</div>
		</div>

		<div class="ContenedorJuegosDestacados">
			<div class="ContenedorTituloJuegosDestacados">
				<h2 class="TituloJuegosDestacados">Juegos Destacados</h2>
			</div>

			<div class="ContenedorRecuadrosJuegosDestacados">
				<div class="RecuadroJuegosDestacados">
					<a>
						<img class="ImgJuegoDestacado" src="Assets/Juegos/EldenRing.jpg">
					</a>
				</div>
				<div class="RecuadroJuegosDestacados">
					<a>
						<img class="ImgJuegoDestacado" src="Assets/Juegos/RE9.jpg">
					</a>
				</div>
				<div class="RecuadroJuegosDestacados">
					<a>
						<img class="ImgJuegoDestacado" src="Assets/Juegos/Bg3.jpg">
					</a>
				</div>
			</div>
		</div>>

	</main>
</body>
</html>
